<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Our Wildlife</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="container">

    <h1>Save Our Wildlife</h1>

    <div class="video-wrapper">
      <video
        id="wildlifeVideo"
        controls
        aria-label="Wildlife conservation promotional video"
      >
        <source src="wildlife.mp4" type="video/mp4" />
        <p>Your browser does not support HTML5 video.
           <a href="wildlife.mp4">Download the video</a> instead.
        </p>
      </video>
    </div>

    <button id="toggleBtn" aria-controls="wildlifeVideo">
      Hide Video
    </button>

    <p class="description">
      Every year, thousands of species face extinction due to habitat loss,
      poaching, and climate change. Join us in protecting the world's most
      vulnerable wildlife. Together, we can make a difference donate,
      volunteer, or simply spread the word.
    </p>

  </main>

  <script src="script.js"></script>
</body>
</html>
